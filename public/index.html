<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SK's Studio</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <canvas id="bg-canvas"></canvas>

    <main class="hero">
      <p class="eyebrow">Welcome to</p>
      <h1>SK's Studio</h1>
      <p class="subtitle">
        Bold ideas, polished design, and motion that feels alive.
      </p>

      <div class="login-card">
        <h2>Member Login</h2>
        <form id="login-form">
          <label>
            <span>Email</span>
            <input type="email" id="email" placeholder="you@example.com" required />
          </label>
          <label>
            <span>Password</span>
            <input type="password" id="password" placeholder="••••••••" required />
          </label>
          <button type="submit" class="btn primary full">Log In</button>
        </form>
        <p id="login-message" class="login-message">Try admin@skstudio.com with password sk12345.</p>
      </div>

      <div class="actions">
        <a class="btn primary" href="#">Explore</a>
        <a class="btn secondary" href="#">Contact</a>
      </div>
    </main>

    <script src="/script.js"></script>
  </body>
</html>
